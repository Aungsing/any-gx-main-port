<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 👾 FAVICON (Website Logo) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👾</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
        }

        /* WebGL Canvas Backgrounds */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }

        #canvas-2d-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Custom Scroll Container */
        [data-scroll-container] {
            position: relative;
            z-index: 3;
            width: 100%;
            min-height: 100vh;
            pointer-events: none; /* Let clicks pass to webgl unless overridden */
        }

        section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            padding: 2rem;
        }

        .interactive-element {
            pointer-events: auto;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .loader-title {
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
            animation: glitch 1s linear infinite;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        /* UI Styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateZ(0);
        }

        h1.hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            opacity: 0;
        }

        p.hero-subtitle {
            font-size: 1rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
            opacity: 0;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            animation: bounce 2s infinite;
        }

        /* Portals Section */
        .section-title {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 4rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .portals-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .portal-card {
            background: rgba(10, 10, 10, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%);
            opacity: 1;
        }

        .portal-card.p1:hover { border-color: var(--accent-purple); box-shadow: 0 0 30px rgba(168, 85, 247, 0.2); }
        .portal-card.p2:hover { border-color: var(--accent-blue); box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .portal-card.p3:hover { border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(6, 182, 212, 0.2); }

        .portal-ui-tag {
            font-size: 0.7rem;
            letter-spacing: 0.15rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .portal-name {
            font-size: 1.25rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        .portal-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            color: #fff;
            background: transparent;
            transition: all 0.3s ease;
        }

        .portal-card:hover .portal-btn {
            background: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px #fff;
        }

        /* Embedded Iframe Modal */
        #portal-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background-color: rgba(0,0,0,0.95);
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            justify-content: center;
            align-items: center;
        }

        .modal-container {
            width: 90%;
            height: 85%;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.3);
        }

        .modal-header {
            width: 100%;
            height: 50px;
            background: rgba(15,15,15,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
        }

        .modal-title {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--font-main);
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .modal-iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
            background: #000;
        }

        /* Animations & Keyframes */
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 0 0 10px var(--accent-cyan); }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 5px var(--accent-purple), -2px 0 5px var(--accent-cyan); }
            40% { transform: translate(-2px, -2px); text-shadow: -2px 0 5px var(--accent-purple), 2px 0 5px var(--accent-cyan); }
            60% { transform: translate(2px, 2px); text-shadow: 2px 0 5px var(--accent-purple), -2px 0 5px var(--accent-cyan); }
            80% { transform: translate(2px, -2px); text-shadow: -2px 0 5px var(--accent-purple), 2px 0 5px var(--accent-cyan); }
            100% { transform: translate(0); text-shadow: 0 0 10px var(--accent-cyan); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive */
        @media (max-width: 968px) {
            .portals-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 0 1rem;
            }
            h1.hero-title {
                font-size: 2rem;
                letter-spacing: 0.4rem;
            }
            .section-title {
                font-size: 1.5rem;
                margin-bottom: 2.5rem;
            }
            .portal-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

        <div class="loader-title">Initializing ANY UNIVERS...</div>

            <div class="loader-progress" id="loader-progress"></div>

    <div data-scroll-container>
        
        <section data-scroll-section id="home">
            <div class="glass-panel interactive-element" data-scroll data-scroll-speed="-1">

                <h2 class="section-title" data-scroll data-scroll-speed="0.5">METAVERSE GATEWAYS</h2>
                
                <div class="portals-container">
                    <div class="portal-card p1 interactive-element" onclick="openPortal('https://aungsing.github.io/any-gx/', 'ANY GX Universe 1')">

                        <div class="portal-name">ANY GX Universe 2</div>

                    <div class="portal-card p3 interactive-element" onclick="openPortal('https://aungsing.github.io/any-gx.2/', 'ANY GX Universe 3')">

    <div id="portal-modal" class="interactive-element">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title" id="modal-title-text">CONNECTING QUANTUM GATEWAY...</div>
                <button class="modal-close" onclick="closePortal()">[ DISCONNECT ]</button>
            </div>
            <iframe id="modal-iframe-element" class="modal-iframe" src="" allow="autoplay; fullscreen; xr-spatial-tracking"></iframe>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>

    <script>
        // --- INITIALIZATION & GLOBAL VARIABLES ---
        let scene, camera, renderer, starField, nebulaMesh;
        let portals3D = [];
        let mouse = new THREE.Vector2();
        let targetMouse = new THREE.Vector2();
        const canvas2D = document.getElementById('canvas-2d-overlay');
        const ctx2D = canvas2D.getContext('2d');
        let sparkles = [];

        // Custom Nebula WebGL Shaders
        const NebulaVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const NebulaFragmentShader = `
            uniform float time;
            uniform vec2 resolution;
            varying vec2 vUv;

            // Description : Array and textureless GLSL 2D/3D/4D simplex 
            //               noise functions.
            //      Author : Ian McEwan, Ashima Arts.
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) { 
                const vec2 C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 =   v - i + dot(i, C.xxx) ;

                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );

                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.www;

                i = mod289(i); 
                vec4 p = permute( permute( permute( 
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;

                vec4 j = p - 49.0 * floor(p * ns.z);

                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );

                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);

                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );

                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));

                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);

                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;

                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                                dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                
                // Construct shifting space coordinates
                vec3 coord1 = vec3(uv * 2.5, time * 0.03);
                vec3 coord2 = vec3(uv * 1.8 + vec2(1.5, 3.2), time * 0.02);
                
                float n1 = snoise(coord1);
                float n2 = snoise(coord2);
                
                // Color mapping structures
                vec3 colorPurple = vec3(0.12, 0.03, 0.25) * (n1 * 0.6 + 0.6);
                vec3 colorBlue   = vec3(0.02, 0.08, 0.22) * (n2 * 0.5 + 0.5);
                vec3 colorCyan   = vec3(0.0, 0.15, 0.2) * (max(0.0, snoise(vec3(uv * 4.0, time * 0.05))));
                
                vec3 finalNebula = colorPurple + colorBlue + colorCyan;
                
                // Deep space gradient vignette
                float vignette = uv.x * (1.0 - uv.x) * uv.y * (1.0 - uv.y);
                vignette = clamp(pow(16.0 * vignette, 0.25), 0.0, 1.0);
                
                gl_FragColor = vec4(finalNebula * vignette, 1.0);
            }
        `;

        // --- LOCOMOTIVE SCROLL INITIALIZATION ---
        const scroll = new LocomotiveScroll({
            el: document.querySelector('[data-scroll-container]'),
            smooth: true,
            multiplier: 0.8,
            smartphone: { smooth: true },
            tablet: { smooth: true }
        });

        // --- CORE SYSTEM SETUP ENGINE ---
        function initEngine() {
            const container = document.getElementById('webgl-container');
            
            // Dimensions configuration
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Scene setup
            scene = new THREE.Scene();

            // Camera setup
            camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
            camera.position.z = 40;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Setup Custom Shader Nebula Background Plane
            const nebulaGeo = new THREE.PlaneGeometry(2, 2);
            const nebulaMat = new THREE.ShaderMaterial({
                vertexShader: NebulaVertexShader,
                fragmentShader: NebulaFragmentShader,
                uniforms: {
                    time: { value: 0.0 },
                    resolution: { value: new THREE.Vector2(width, height) }
                },
                depthWrite: false,
                depthTest: false
            });
            nebulaMesh = new THREE.Mesh(nebulaGeo, nebulaMat);
            
            // Setup a complete orthographic background camera structure implicitly by matching scene order
            const backgroundScene = new THREE.Scene();
            backgroundScene.add(nebulaMesh);

            // Lighting Ecosystem (Cinematic Focus)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0x06b6d4, 1.5);
            directionalLight1.position.set(20, 20, 20);
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xa855f7, 1.5);
            directionalLight2.position.set(-20, -20, 20);
            scene.add(directionalLight2);

            // Create Starfield Matrix
            createStarfield();

            // Create Spline-Simulated Interactive Portals
            createProceduralPortals();

            // Handle Event Interfaces
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            
            // Scale and initialize 2D Graphics Canvas
            resizeCanvas2D();
            createSparkleParticles();

            // Trigger Launch Simulation Sequences
            simulateLoader();
        }

        // --- PROCEDURAL GENERATION MODULES ---
        function createStarfield() {
            const starCount = 2500;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                // Spherical cluster layout configuration
                const radius = 80 + Math.random() * 120;
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);

                // Stellar procedural coloration
                const randColor = Math.random();
                if (randColor > 0.6) {
                    colors[i] = 0.65; colors[i+1] = 0.85; colors[i+2] = 1.0; // Cyan tint
                } else if (randColor > 0.3) {
                    colors[i] = 0.9; colors[i+1] = 0.7; colors[i+2] = 1.0;  // Purple tint
                } else {
                    colors[i] = 1.0; colors[i+1] = 1.0; colors[i+2] = 1.0;  // Pure white
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Custom procedural textureless round star structure mapping
            const starMaterial = new THREE.PointsMaterial({
                size: 0.4,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            starField = new THREE.Points(geometry, starMaterial);
            scene.add(starField);
        }

        function createProceduralPortals() {
            // Colors matching our design targets
            const portalColors = [0xa855f7, 0x3b82f6, 0x06b6d4]; 
            const positionsX = [-18, 0, 18];

            for (let i = 0; i < 3; i++) {
                const group = new THREE.Group();
                group.position.set(positionsX[i], -35, 0); // Position under the second view section natively

                // Core Sphere
                const coreGeo = new THREE.SphereGeometry(3.5, 32, 32);
                const coreMat = new THREE.MeshPhongMaterial({
                    color: portalColors[i],
                    emissive: portalColors[i],
                    emissiveIntensity: 0.5,
                    shininess: 100,
                    transparent: true,
                    opacity: 0.9,
                    wireframe: true
                });
                const coreMesh = new THREE.Mesh(coreGeo, coreMat);
                group.add(coreMesh);

                // Celestial Accretion Disc Rings (Spline simulation representation)
                const ringGeo = new THREE.TorusGeometry(5.5, 0.15, 16, 100);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: portalColors[i],
                    roughness: 0.1,
                    metalness: 0.9,
                    transparent: true,
                    opacity: 0.7
                });
                
                const ringMesh1 = new THREE.Mesh(ringGeo, ringMat);
                ringMesh1.rotation.x = Math.PI / 2;
                group.add(ringMesh1);

                const ringMesh2 = new THREE.Mesh(ringGeo, ringMat);
                ringMesh2.rotation.y = Math.PI / 4;
                group.add(ringMesh2);

                scene.add(group);
                portals3D.push({
                    group: group,
                    core: coreMesh,
                    r1: ringMesh1,
                    r2: ringMesh2,
                    baseY: -35
                });
            }
        }

        // --- CANVAS 2D SPARKLE OVERLAY MODULE ---
        function resizeCanvas2D() {
            canvas2D.width = window.innerWidth;
            canvas2D.height = window.innerHeight;
        }

        function createSparkleParticles() {
            const quantity = 60;
            for(let i = 0; i < quantity; i++) {
                sparkles.push({
                    x: Math.random() * canvas2D.width,
                    y: Math.random() * canvas2D.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.2 - 0.1,
                    alpha: Math.random(),
                    fadeSpeed: 0.005 + Math.random() * 0.01
                });
            }
        }

        function drawSparkles() {
            ctx2D.clearRect(0,0, canvas2D.width, canvas2D.height);
            ctx2D.fillStyle = 'rgba(255, 255, 255, ';
            
            for(let i=0; i < sparkles.length; i++) {
                let s = sparkles[i];
                s.x += s.speedX;
                s.y += s.speedY;
                s.alpha -= s.fadeSpeed;

                if (s.alpha <= 0 || s.y < 0 || s.x < 0 || s.x > canvas2D.width) {
                    s.x = Math.random() * canvas2D.width;
                    s.y = canvas2D.height + 10;
                    s.alpha = Math.random();
                }

                ctx2D.beginPath();
                ctx2D.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx2D.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx2D.fill();
            }
        }

        // --- EVENT CAPTURE LOGIC ---
        function onMouseMove(event) {
            targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            
            nebulaMesh.material.uniforms.resolution.value.set(w, h);
            resizeCanvas2D();
        }

        // --- LOADER SIMULATOR & TIMELINE TRIGGER ---
        function simulateLoader() {
            let progressBar = document.getElementById('loader-progress');
            let progress = 0;
            
            let interval = setInterval(() => {
                progress += Math.floor(Math.random() * 12) + 4;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    // Fire Cinematic Entry GSAP Sequences
                    gsap.to('#loader', {
                        opacity: 0,
                        duration: 1,
                        delay: 0.5,
                        onComplete: () => {
                            document.getElementById('loader').style.display = 'none';
                            executeIntroAnimations();
                        }
                    });
                }
                progressBar.style.width = progress + '%';
            }, 80);
        }

        function executeIntroAnimations() {
            // Animate cinematic header components
            gsap.to('#main-title', {
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: 'power4.out'
            });

            gsap.to('.hero-subtitle', {
                opacity: 1,
                y: 0,
                duration: 1.5,
                delay: 0.4,
                ease: 'power4.out'
            });

            // Animate 3D Camera initialization swoop
            gsap.from(camera.position, {
                z: 100,
                duration: 2.5,
                ease: 'power3.out'
            });
        }

        // --- INTERACTIVE PORTAL ACTIONS ---
        function openPortal(url, name) {
            document.getElementById('modal-title-text').innerText = `STABILIZING SINGULARITY LINK TO: ${name.toUpperCase()}...`;
            document.getElementById('modal-iframe-element').src = url;
            
            let modal = document.getElementById('portal-modal');
            modal.style.display = 'flex';
            
            gsap.to(modal, {
                opacity: 1,
                duration: 0.6,
                ease: 'power2.out'
            });
        }

        function closePortal() {
            let modal = document.getElementById('portal-modal');
            gsap.to(modal, {
                opacity: 0,
                duration: 0.4,
                ease: 'power2.in',
                onComplete: () => {
                    modal.style.display = 'none';
                    document.getElementById('modal-iframe-element').src = '';
                }
            });
        }

        // --- ANIMATION FRAME ENGINE ---
        let clock = new THREE.Clock();

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            
            const elapsed = clock.getElapsedTime();

            // Update Shader Time Matrices
            nebulaMesh.material.uniforms.time.value = elapsed;

            // Smooth Interpolation for Mouse Movement (Drift Mechanics)
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            // Camera Cinematic Subtle Floating Drift
            camera.position.x = mouse.x * 4;
            camera.position.y = mouse.y * 4;
            camera.lookAt(0, camera.position.y * 0.5, 0);

            // Rotate Starfield subtly
            if (starField) {
                starField.rotation.y = elapsed * 0.015;
                starField.rotation.x = elapsed * 0.005;
            }

            // Dynamically manage 3D Portal System Animations & Layout Positions
            // Track Locomotive scroll mapping directly to translate WebGL spaces smoothly
            let currentScrollY = scroll.scroll.instance.scroll.y;
            let viewportHeight = window.innerHeight;
            let targetYOffset = (currentScrollY / viewportHeight) * 35; 

            portals3D.forEach((portal, index) => {
                // Update procedural 3D positioning natively linked to scroll delta
                portal.group.position.y = portal.baseY + targetYOffset;

                // Rotational parameters mapping for simulated spline layout engine
                portal.core.rotation.y = -elapsed * 0.5;
                portal.core.rotation.z = elapsed * 0.2;
                
                portal.r1.rotation.z = elapsed * 0.8 + (index * 0.5);
                portal.r2.rotation.x = elapsed * 0.4 - (index * 0.3);
                
                // Add automated floating effect amplitude matrix
                portal.group.position.y += Math.sin(elapsed * 1.5 + index) * 0.3;
            });

            // Draw 2D Sparkle Particles Interface
            drawSparkles();

            // Execute Render
            renderer.render(scene, camera);
        }

        // --- START ENGINE RUNTIME ---
        window.onload = () => {
            initEngine();
            renderLoop();
        };
    </script>
</body>
</html>
